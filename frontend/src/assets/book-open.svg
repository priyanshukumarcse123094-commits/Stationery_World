<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bookCoverGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4d7260" />
      <stop offset="100%" stop-color="#325147" />
    </linearGradient>
    <linearGradient id="bookPageGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFF9F1" />
      <stop offset="100%" stop-color="#E7DCC8" />
    </linearGradient>
    <linearGradient id="bookEdge" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#D2B69C" />
      <stop offset="100%" stop-color="#EBD8C3" />
    </linearGradient>
    <linearGradient id="bookHighlight" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>

    <filter id="bookShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.22" />
    </filter>

    <pattern id="pageTexture" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0 0 L8 0" stroke="rgba(0,0,0,0.03)" stroke-width="1" />
    </pattern>
  </defs>

  <g filter="url(#bookShadow)">
    <!-- Cover -->
    <path d="M48 40 L192 40 L216 190 L124 190 L104 122 L78 122 L58 190 L18 190 Z"
      fill="url(#bookCoverGrad)" stroke="#2c2d2f" stroke-width="4" />

    <!-- Cover texture -->
    <path d="M50 44 L190 44 L210 186 L126 186 L106 122 L80 122 L60 186 L22 186 Z"
      fill="url(#bookHighlight)" opacity="0.35" />

    <!-- Pages -->
    <path d="M64 56 L176 56 L176 182 L64 182 Z" fill="url(#bookPageGrad)" />

    <!-- Page texture -->
    <path d="M64 56 L176 56 L176 182 L64 182 Z" fill="url(#pageTexture)" opacity="0.35" />

    <!-- Spine and edge -->
    <path d="M64 56 L60 188 L124 188 L124 126 L160 126 L160 182 L176 182 L176 56 Z"
      fill="url(#bookEdge)" opacity="0.8" />

    <!-- Page line details -->
    <g stroke="#C1A180" stroke-width="1.2" opacity="0.9">
      <path d="M72 74 L168 74" />
      <path d="M72 92 L168 92" />
      <path d="M72 110 L168 110" />
      <path d="M72 128 L168 128" />
      <path d="M72 146 L168 146" />
      <path d="M72 164 L168 164" />
    </g>

    <!-- Bookmark -->
    <rect x="124" y="58" width="16" height="60" rx="5" fill="#C0714F" />
    <path d="M124 118 L140 118 L132 132 Z" fill="#9C4F3A" />

    <!-- Accent creases -->
    <path d="M70 58 C82 50 158 50 170 58" stroke="rgba(255,255,255,0.35)" stroke-width="5" fill="none" opacity="0.55" />

    <!-- Shadow overlay on pages -->
    <path d="M64 56 L176 56 L176 182 L64 182 Z" fill="rgba(0,0,0,0.05)" />
  </g>
</svg>
