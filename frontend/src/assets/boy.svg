<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="skin" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#F3D2B8" />
      <stop offset="100%" stop-color="#E2B18A" />
    </linearGradient>
    <linearGradient id="hair" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#412B22" />
      <stop offset="100%" stop-color="#2B1A14" />
    </linearGradient>
    <linearGradient id="shirt" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4D7260" />
      <stop offset="100%" stop-color="#2F4F46" />
    </linearGradient>
    <linearGradient id="pants" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#374D49" />
      <stop offset="100%" stop-color="#223B38" />
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#000" flood-opacity="0.22" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Legs -->
    <path d="M80 148 L86 194 L98 192 L94 148 Z" fill="url(#pants)" />
    <path d="M112 148 L118 194 L130 192 L126 148 Z" fill="url(#pants)" />

    <!-- Shoes -->
    <path d="M82 194 L94 198 L96 192 L84 188 Z" fill="#2E1D16" />
    <path d="M112 194 L124 198 L126 192 L114 188 Z" fill="#2E1D16" />

    <!-- Shirt -->
    <path d="M72 92 C70 124 70 154 78 170 C86 186 114 186 122 170 C130 154 130 124 128 92 Z" fill="url(#shirt)" />
    <path d="M72 92 L98 68 L118 92" fill="rgba(255,255,255,0.14)" />
    <path d="M82 98 L116 98" stroke="rgba(255,255,255,0.18)" stroke-width="2" />

    <!-- Arms -->
    <path d="M70 104 C58 116 58 138 70 144" fill="#E2B18A" />
    <path d="M130 104 C142 116 142 138 130 144" fill="#E2B18A" />
    <path d="M68 112 C80 120 84 122 88 114" stroke="#E2B18A" stroke-width="2" fill="none" />
    <path d="M132 112 C120 120 116 122 112 114" stroke="#E2B18A" stroke-width="2" fill="none" />

    <!-- Neck -->
    <path d="M90 86 L110 86 L110 96 L90 96 Z" fill="#F3D2B8" />

    <!-- Head -->
    <circle cx="100" cy="56" r="32" fill="url(#skin)" />

    <!-- Hair -->
    <path d="M64 58 C64 32 136 32 136 58 C136 82 108 74 100 74 C92 74 64 82 64 58Z" fill="url(#hair)" />
    <path d="M70 54 C82 44 118 44 130 54" stroke="rgba(0,0,0,0.2)" stroke-width="2" fill="none" />

    <!-- Brows -->
    <path d="M82 56 C86 52 92 52 96 56" stroke="#2E1D16" stroke-width="2" fill="none" />
    <path d="M108 56 C112 52 118 52 122 56" stroke="#2E1D16" stroke-width="2" fill="none" />

    <!-- Eyes -->
    <circle cx="88" cy="60" r="4" fill="#2E1D16" />
    <circle cx="112" cy="60" r="4" fill="#2E1D16" />
    <circle cx="89" cy="59" r="1.2" fill="#fff" />
    <circle cx="113" cy="59" r="1.2" fill="#fff" />

    <!-- Nose -->
    <path d="M100 64 C98 66 102 66 100 64" stroke="#2E1D16" stroke-width="1" fill="none" />

    <!-- Mouth -->
    <path d="M86 74 C90 80 110 80 114 74" stroke="#2E1D16" stroke-width="2" stroke-linecap="round" fill="none" />

    <!-- Cheeks -->
    <circle cx="82" cy="72" r="3" fill="#F2D0B3" opacity="0.7" />
    <circle cx="118" cy="72" r="3" fill="#F2D0B3" opacity="0.7" />
  </g>
</svg>
